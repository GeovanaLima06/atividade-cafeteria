<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <header>
        <nav class="menu">
            <div class="logo">
                <i class="bi bi-cup-hot"></i>
                <p>Café Delicia</p>
            </div>
            <div class="categorias">
                <p>Inicio </p>
                <p>Productos</p>
                <p> sobre nosotros</p>
                <p>Contacto</p>
            </div>
            <div class="carrinho"><i class="bi bi-cart"></i></div>
        </nav>
    </header>
    <main>
        <section class="banner">

            <div class="caixa-banner">

                <div class="txt-banner">
                    <p class="titulo">Bienvenido a Café Delicia</p>
                    <p class="descricao">
                        El mejor café artesanal y repostería fresca todos los días
                    </p>
                    <button class="btn-bn">Ver menú</button>

                </div>
            </div>

        </section>
        <section class="pag-2">
            <div class="txt-pag2">
                <p class="tt2">Nuestros Productos</p>
                <p class="des2">Descubre nuestra selección de cafés artesanales, repostería fresca y alimentos deliciosos </p>
                <p class="des2">preparados con los mejores ingredientes</p>
            </div>
            <div class="btns2">
                <button class="btnfood"><i class="bi bi-cup-hot"></i> Café</button>
                <button class="btnfood"><i class="bi bi-cake2">Repostería</i></button>
                <button class="btnfood"><i class="bi bi-egg-fried"></i>Comida</button>
                
            </div>

        </section>
    </main>

</body>

</html>
